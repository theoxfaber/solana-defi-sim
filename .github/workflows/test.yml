name: Solana CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.15/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v1.0.0 anchor-cli --locked

      - name: Generate Solana Keypair
        run: |
          solana-keygen new --no-bip39-passphrase --silent
          solana config set --url localhost

      - name: Start Validator
        run: |
          solana-test-validator --reset --quiet &
          sleep 10

      - name: Anchor Build & Test
        run: |
          cd asymmetric_spl
          yarn install
          anchor build
          anchor test --skip-local-validator

      - name: Install Liquidity Manager
        run: |
          cd liquidity_manager
          npm install

      - name: Install Vol Sim Agent
        run: |
          cd vol_sim_agent
          pip install -r requirements.txt
          python -c "from metrics import MetricsTracker; print('✓ Python imports OK')"
