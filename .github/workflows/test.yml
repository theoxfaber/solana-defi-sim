name: Solana CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -----------------------------------------------------------------------
  # Anchor Program Build & Test
  # -----------------------------------------------------------------------
  anchor-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-1.18.15-${{ runner.os }}

      - name: Install Solana
        run: |
          if ! command -v solana &> /dev/null; then
            sh -c "$(curl -sSfL https://release.solana.com/v1.18.15/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor (via avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force --locked
          avm install 0.30.1
          avm use 0.30.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Generate Keypair
        run: |
          solana-keygen new --no-bip39-passphrase --silent
          solana config set --url localhost

      - name: Install Test Dependencies
        run: |
          cd asymmetric_spl
          yarn install --frozen-lockfile || yarn install

      - name: Build
        run: |
          cd asymmetric_spl
          anchor build

      - name: Test
        run: |
          cd asymmetric_spl
          anchor test

  # -----------------------------------------------------------------------
  # Python Agent Tests
  # -----------------------------------------------------------------------
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vol_sim_agent/requirements.txt

      - name: Install Dependencies
        run: |
          cd vol_sim_agent
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          cd vol_sim_agent
          pytest test_agent.py -v --tb=short

      - name: Verify Imports
        run: |
          cd vol_sim_agent
          python -c "
          from metrics import MetricsTracker
          from main import SimulationConfig, get_anchor_discriminator, parse_args
          print('✓ All Python imports verified')
          "

  # -----------------------------------------------------------------------
  # Node.js Orchestrator Validation
  # -----------------------------------------------------------------------
  orchestrator-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Validate
        run: |
          cd liquidity_manager
          npm install
          node -e "
          const { validateConfig } = require('./config_schema');
          const testConfig = {
            TOKEN_MINT: 'A'.repeat(44),
            POOL_WALLET_PUBLIC_KEY: 'A'.repeat(44),
            POOL_WALLET_PRIVATE_KEY: 'A'.repeat(88),
            AUTHORITY_PUBLIC_KEY: 'A'.repeat(44),
            ALLOWLIST_PDA: 'A'.repeat(44),
            CHILD_WALLETS: [{ pubkey: 'A'.repeat(44), private_key: 'A'.repeat(88) }],
            DECIMALS: 6,
            RPC_URL: 'http://127.0.0.1:8899',
          };
          const errors = validateConfig(testConfig);
          if (errors.length > 0) { console.error(errors); process.exit(1); }
          console.log('✓ Config schema validation works');
          "
