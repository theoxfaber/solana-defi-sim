name: Solana CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.15/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v1.0.0 anchor-cli --locked

      - name: Start Validator
        run: |
          solana-test-validator --reset --quiet &
          sleep 10
          solana config set --url localhost

      - name: Install Dependencies
        run: |
          npm install
          cd asymmetric_spl && npm install

      - name: Anchor Build & Test
        run: |
          cd asymmetric_spl
          anchor build
          anchor test
